<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CircularList — démo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: monospace; }

    body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      height: 100%;
      background: #f5f3ed;
      color: #2c2c2a;
    }

    .controls {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .controls label {
      font-size: 13px;
      color: #888780;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .controls span {
      font-size: 13px;
      font-weight: 500;
      color: #2c2c2a;
      min-width: 32px;
    }

    #container {
      flex: 1;
      min-height: 80px;
      border: 0.5px solid #c0beb5;
      background: #eceae3;
    }

    .hint {
      flex-shrink: 0;
      font-size: 12px;
      color: #aaa89f;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      body       { background: #1e1e1c; color: #e8e6e0; }
      .controls label { color: #666663; }
      .controls span  { color: #e8e6e0; }
      #container { background: #272725; border-color: #3a3a37; }
    }
  </style>
</head>
<body>

  <div class="controls">
    <label>éléments
      <input type="range" min="1" max="1000" value="500" id="nSlider" style="width:120px">
      <span id="nVal">500</span>
    </label>
    <label>hauteur
      <input type="range" min="12" max="120" value="16" id="hSlider" style="width:100px">
      <span id="hVal">16</span>px
    </label>
    <label>gap
      <input type="range" min="0" max="24" value="0" id="gSlider" style="width:80px">
      <span id="gVal">0</span>px
    </label>
    <label>aller à #
      <input type="number" min="1" id="gotoInput" style="width:64px">
      <select id="anchorSel">
        <option value="middle">milieu</option>
        <option value="top">haut</option>
        <option value="bottom">bas</option>
      </select>
      <button id="gotoBtn">ok</button>
    </label>
  </div>

  <div id="container"></div>
  <p class="hint">molette · glisser · tactile — scroll circulaire sans duplication</p>

  <script type="module">
    import { CircularList, ListAdapter } from './js/circularList.js';
    import { StackDrawer } from './js/stackDrawer.js';

    // ── Données : de simples nombres ────────────────────────────────────────
    function makeData(n) {
      // return Array.from({ length: n }, () => Math.random() * 0.85 + 0.05);
      return Array.from({ length: n }, (_, i) => i);
    }

    // ── Initialisation ──────────────────────────────────────────────────────
    const nSlider    = document.getElementById('nSlider');
    const hSlider    = document.getElementById('hSlider');
    const gSlider    = document.getElementById('gSlider');
    const nVal       = document.getElementById('nVal');
    const hVal       = document.getElementById('hVal');
    const gVal       = document.getElementById('gVal');
    const gotoInput  = document.getElementById('gotoInput');
    const anchorSel  = document.getElementById('anchorSel');
    const gotoBtn    = document.getElementById('gotoBtn');


    const drawer = new StackDrawer(
      new ListAdapter(makeData(+nSlider.value)),
      nSlider.value
    );
    
    const list = new CircularList(
      document.getElementById('container'),
      new ListAdapter(makeData(+nSlider.value)),
      { itemHeight: +hSlider.value, gap: +gSlider.value },
      drawer.draw
    );

    function reset() {
      const n = +nSlider.value, h = +hSlider.value, g = +gSlider.value;
      nVal.textContent = n;
      hVal.textContent = h;
      gVal.textContent = g;
      list.setItems(new ListAdapter(makeData(n)));
      drawer.setMaxValue(n-1);
      list.setOptions({ itemHeight: h, gap: g });
    }

    nSlider.addEventListener('input', reset);
    hSlider.addEventListener('input', reset);
    gSlider.addEventListener('input', reset);

    gotoBtn.addEventListener('click', () => {
      const i = Number.parseInt(gotoInput.value, 10);
      if (!Number.isNaN(i)) list.scrollTo(i - 1, anchorSel.value);
    });
  </script>

</body>
</html>
